<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LIOS Chat Studio</title>
    <style>
        :root {
            --bg: #f4f1e8;
            --paper: #fffdf8;
            --ink: #1c2322;
            --muted: #61706c;
            --brand: #126d67;
            --accent: #cf642e;
            --line: #d9d2c6;
            --shadow: 0 18px 40px rgba(16, 24, 22, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, #f8dcc2 0, transparent 34%),
                radial-gradient(circle at top right, #d8efe7 0, transparent 28%),
                linear-gradient(160deg, #faf7f0 0%, #f1eee7 100%);
        }
        .shell {
            max-width: 1180px;
            margin: 24px auto;
            padding: 0 16px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 16px;
        }
        .card {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .sidebar { padding: 16px; }
        .title h1 { margin: 0; font-size: 1.25rem; }
        .title p { margin: 6px 0 0; color: var(--muted); font-size: 0.92rem; }
        .field { margin-top: 14px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }
        input, textarea, button {
            font: inherit;
        }
        input, textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 12px;
            background: #fff;
            color: var(--ink);
        }
        textarea { resize: vertical; min-height: 80px; }
        .help { margin-top: 10px; color: var(--muted); font-size: 0.8rem; line-height: 1.4; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
        button {
            border: 0;
            border-radius: 12px;
            padding: 11px 14px;
            cursor: pointer;
            font-weight: 700;
            transition: transform 120ms ease, opacity 120ms ease;
        }
        button:hover { transform: translateY(-1px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .ghost { background: #ece7dc; color: #24302d; }
        .primary { background: var(--brand); color: #fff; }
        .workspace {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 78vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(110deg, #fff 0%, #f8f5ef 100%);
        }
        .header strong { font-size: 1rem; }
        .status {
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid #bcd9d2;
            background: #dff2ed;
            color: #255e57;
            font-size: 0.76rem;
            font-family: monospace;
        }
        .log {
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .bubble {
            max-width: 88%;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid var(--line);
            line-height: 1.45;
            white-space: pre-wrap;
            animation: rise 180ms ease;
        }
        .bubble.user { align-self: flex-end; background: #e9f3f0; border-color: #beddd7; }
        .bubble.assistant { align-self: flex-start; background: #fff; }
        .meta { margin-top: 8px; color: var(--muted); font-size: 0.74rem; font-family: monospace; }
        .feedback-buttons {
            margin-top: 8px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .feedback-btn {
            padding: 6px 10px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #f0f0f0;
            color: var(--ink);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 120ms ease;
        }
        .feedback-btn:hover { background: var(--line); }
        .feedback-btn.success { background: #90ee90; border-color: #228b22; }
        .feedback-btn.error { background: #ffb6c6; border-color: #c41e3a; }
        .composer {
            padding: 14px;
            border-top: 1px solid var(--line);
            background: #fbfaf6;
            display: grid;
            grid-template-columns: 1fr 128px;
            gap: 12px;
        }
        .composer textarea { min-height: 56px; max-height: 160px; }
        .send { background: var(--accent); color: #fff; }
        @keyframes rise {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .mode-toggle {
            padding: 8px 12px;
            margin-top: 10px;
            border-radius: 8px;
            background: #e8f4f1;
            border: 1px solid var(--brand);
            display: flex;
            gap: 6px;
            font-size: 0.85rem;
        }
        .mode-toggle button {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid transparent;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
        }
        .mode-toggle button.active {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }
        .learn-panel {
            margin-top: 14px;
            padding: 10px;
            background: #f0f8f5;
            border: 1px solid #b8e2d9;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .learn-status { margin-top: 6px; color: var(--muted); }
        .learn-stat { display: flex; justify-content: space-between; margin: 4px 0; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--paper);
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--line);
        }
        .modal-close {
            float: right;
            border: 0;
            background: transparent;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
        }
        .modal-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 12px; }
        @media (max-width: 900px) {
            .shell { grid-template-columns: 1fr; }
            .workspace { min-height: 70vh; }
            .bubble { max-width: 100%; }
            .composer { grid-template-columns: 1fr; }
            .actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <aside class="card sidebar">
            <div class="title">
                <h1>LIOS Chat Studio</h1>
                <p>Local-first training workspace</p>
            </div>

            <div class="mode-toggle">
                <button class="active" id="serveModeBtn">Serve</button>
                <button id="learnModeBtn">Learn</button>
            </div>

            <div class="field">
                <label for="sessionId">Session ID</label>
                <input id="sessionId" />
            </div>

            <div class="field">
                <label for="jurisdictions">Jurisdictions</label>
                <input id="jurisdictions" placeholder="EU, Germany" />
            </div>

            <div class="field">
                <label for="profile">Company profile JSON</label>
                <textarea id="profile" placeholder='{"employees":750,"turnover_eur":350000000,"listed":true}'></textarea>
            </div>

            <div class="actions">
                <button class="ghost" id="loadBtn">Load Session</button>
                <button class="ghost" id="exportBtn">Export JSONL</button>
            </div>

            <div id="learnPanel" class="learn-panel" style="display:none;">
                <strong>Learn Mode</strong>
                <div class="learn-status" id="learnStatus">
                    <div class="learn-stat"><span>Accuracy:</span> <span id="accuracy">--</span></div>
                    <div class="learn-stat"><span>Questions:</span> <span id="qCount">0</span></div>
                    <div class="learn-stat"><span>Topics:</span> <span id="tCount">0</span></div>
                </div>
                <button class="ghost" id="nextQBtn" style="width:100%;margin-top:8px;">Next Question</button>
                <button class="ghost" id="summaryBtn" style="width:100%;margin-top:6px;">Session Summary</button>
            </div>

            <div class="help">Every exchange is stored locally in logs/chat_training.jsonl for iterative training and prompt tuning.</div>
        </aside>

        <section class="card workspace">
            <header class="header">
                <strong>Interactive Legal Chat</strong>
                <span class="status" id="status">ready</span>
            </header>
            <main class="log" id="chatLog"></main>
            <footer class="composer">
                <textarea id="prompt" placeholder="Ask LIOS a compliance question..."></textarea>
                <button class="send" id="sendBtn">Send</button>
            </footer>
        </section>
    </div>

    <div id="summaryModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="document.getElementById('summaryModal').classList.remove('active')">×</button>
            <div class="modal-title">Session Summary</div>
            <div id="summaryContent"></div>
        </div>
    </div>

    <script>
        const chatLog = document.getElementById("chatLog");
        const statusEl = document.getElementById("status");
        const promptEl = document.getElementById("prompt");
        const sendBtn = document.getElementById("sendBtn");
        const loadBtn = document.getElementById("loadBtn");
        const exportBtn = document.getElementById("exportBtn");
        const sessionEl = document.getElementById("sessionId");
        const jursEl = document.getElementById("jurisdictions");
        const profileEl = document.getElementById("profile");
        const serveModeBtn = document.getElementById("serveModeBtn");
        const learnModeBtn = document.getElementById("learnModeBtn");
        const learnPanel = document.getElementById("learnPanel");
        const nextQBtn = document.getElementById("nextQBtn");
        const summaryBtn = document.getElementById("summaryBtn");

        let learnMode = false;
        let assistantMessages = [];  // Track assistant messages for feedback

        sessionEl.value = `session-${Date.now().toString(36)}`;

        function addBubble(text, role, meta = "") {
            const bubble = document.createElement("div");
            bubble.className = `bubble ${role}`;
            bubble.textContent = text;
            if (meta) {
                const metaEl = document.createElement("div");
                metaEl.className = "meta";
                metaEl.textContent = meta;
                bubble.appendChild(metaEl);
            }
            
            // Add feedback buttons for assistant messages in learn mode
            if (role === "assistant" && learnMode) {
                const feedbackDiv = document.createElement("div");
                feedbackDiv.className = "feedback-buttons";
                const msgIndex = assistantMessages.length;
                assistantMessages.push(text);  // Store message

                const buttons = [
                    { label: "✓ Correct", value: "correct", class: "success" },
                    { label: "✗ Incorrect", value: "incorrect", class: "error" },
                    { label: "~ Partial", value: "partially_correct", class: "" },
                    { label: "? Unclear", value: "unclear", class: "" },
                ];

                buttons.forEach(btn => {
                    const fbBtn = document.createElement("button");
                    fbBtn.className = `feedback-btn ${btn.class}`;
                    fbBtn.textContent = btn.label;
                    fbBtn.onclick = () => submitFeedback(btn.value, msgIndex, fbBtn);
                    feedbackDiv.appendChild(fbBtn);
                });

                bubble.appendChild(feedbackDiv);
            }

            chatLog.appendChild(bubble);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function setLearnMode(enabled) {
            learnMode = enabled;
            learnPanel.style.display = enabled ? "block" : "none";
            serveModeBtn.classList.toggle("active", !enabled);
            learnModeBtn.classList.toggle("active", enabled);
            if (enabled) {
                updateLearnStatus();
            }
        }

        serveModeBtn.addEventListener("click", () => setLearnMode(false));
        learnModeBtn.addEventListener("click", () => setLearnMode(true));

        function parseProfile() {
            const raw = profileEl.value.trim();
            if (!raw) return null;
            return JSON.parse(raw);
        }

        async function submitFeedback(feedbackType, msgIndex, button) {
            try {
                button.disabled = true;
                button.textContent = "Submitting...";

                const response = await fetch("/chat/api/feedback", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: sessionEl.value,
                        turn_id: msgIndex,
                        response: feedbackType,
                        feedback_text: null,
                        confidence_level: 0.5,
                    }),
                });

                if (!response.ok) {
                    button.textContent = "Error";
                    return;
                }

                button.disabled = true;
                button.style.opacity = "0.5";
                button.textContent = "✓ Sent";
                updateLearnStatus();
            } catch (error) {
                button.textContent = "Error";
                console.error("Feedback submission error:", error);
            }
        }

        async function updateLearnStatus() {
            if (!learnMode) return;
            try {
                const response = await fetch(`/chat/api/learn-status?session_id=${encodeURIComponent(sessionEl.value)}`);
                const data = await response.json();
                document.getElementById("accuracy").textContent = `${(data.accuracy * 100).toFixed(0)}%`;
                document.getElementById("qCount").textContent = data.total_questions_answered;
                document.getElementById("tCount").textContent = data.topics_covered.length;
            } catch (error) {
                console.error("Error updating learn status:", error);
            }
        }

        async function getNextQuestion() {
            try {
                statusEl.textContent = "generating";
                const response = await fetch(`/chat/api/next-question?session_id=${encodeURIComponent(sessionEl.value)}`);
                const data = await response.json();
                if (!response.ok) {
                    alert("Could not generate next question");
                    return;
                }
                promptEl.value = data.question;
                promptEl.focus();
            } catch (error) {
                alert("Error getting next question: " + error);
            } finally {
                statusEl.textContent = "ready";
            }
        }

        async function showSessionSummary() {
            try {
                statusEl.textContent = "summarizing";
                const response = await fetch(`/chat/api/session-summary?session_id=${encodeURIComponent(sessionEl.value)}`);
                const data = await response.json();
                if (!response.ok) {
                    alert("Could not generate summary");
                    return;
                }

                let html = `
                    <p><strong>Total Turns:</strong> ${data.total_turns}</p>
                    <p><strong>Duration:</strong> ${Math.round(data.duration_seconds / 60)} minutes</p>
                    <p><strong>Feedback Collected:</strong> ${JSON.stringify(data.feedback_collected)}</p>
                    <p><strong>Confidence Improvement:</strong> ${(data.confidence_metrics.confidence_improvement * 100).toFixed(1)}%</p>
                    <p><strong>Topics Covered:</strong></p>
                    <ul>
                        ${(data.key_learning_events || []).slice(0, 5).map(e => `<li>${e.topic} - ${e.event_type}</li>`).join('')}
                    </ul>
                    <p><strong>Recommended Next Steps:</strong></p>
                    <ul>
                        ${(data.recommended_next_steps || []).map(s => `<li>${s}</li>`).join('')}
                    </ul>
                `;

                document.getElementById("summaryContent").innerHTML = html;
                document.getElementById("summaryModal").classList.add("active");
            } catch (error) {
                alert("Error generating summary: " + error);
            } finally {
                statusEl.textContent = "ready";
            }
        }

        nextQBtn.addEventListener("click", getNextQuestion);
        summaryBtn.addEventListener("click", showSessionSummary);

        async function sendMessage() {
            const query = promptEl.value.trim();
            if (!query) return;

            let companyProfile = null;
            try {
                companyProfile = parseProfile();
            } catch {
                addBubble("Invalid company profile JSON. Please fix it and try again.", "assistant");
                return;
            }

            const jurisdictions = jursEl.value.split(",").map((value) => value.trim()).filter(Boolean);

            addBubble(query, "user");
            promptEl.value = "";
            statusEl.textContent = "thinking";
            sendBtn.disabled = true;

            try {
                const response = await fetch("/chat/api/message", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        query,
                        session_id: sessionEl.value,
                        jurisdictions,
                        company_profile: companyProfile,
                    }),
                });

                const data = await response.json();
                if (!response.ok) {
                    addBubble(`Error: ${data.error || "request failed"}`, "assistant");
                    return;
                }

                const citations = (data.citations || [])
                    .slice(0, 3)
                    .map((citation) => `${citation.regulation} ${citation.article_id}`)
                    .join(" | ");
                addBubble(data.answer, "assistant", `intent=${data.intent}${citations ? " | " + citations : ""}`);
            } catch (error) {
                addBubble(`Request failed: ${error}`, "assistant");
            } finally {
                statusEl.textContent = "ready";
                sendBtn.disabled = false;
            }
        }

        async function loadSession() {
            statusEl.textContent = "loading";
            chatLog.innerHTML = "";
            assistantMessages = [];
            try {
                const response = await fetch(`/chat/api/history?session_id=${encodeURIComponent(sessionEl.value)}`);
                const data = await response.json();
                if (!response.ok) {
                    addBubble(`Error: ${data.error || "unable to load session"}`, "assistant");
                    return;
                }
                for (const turn of data.turns || []) {
                    addBubble(turn.user_query || "", "user");
                    addBubble(turn.answer || "", "assistant", `intent=${turn.intent || "unknown"}`);
                }
                updateLearnStatus();
            } finally {
                statusEl.textContent = "ready";
            }
        }

        async function exportSession() {
            const response = await fetch(`/chat/api/export?session_id=${encodeURIComponent(sessionEl.value)}`);
            if (!response.ok) {
                addBubble("Could not export session.", "assistant");
                return;
            }
            const text = await response.text();
            const blob = new Blob([text], { type: "application/x-ndjson" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${sessionEl.value}.jsonl`;
            link.click();
            URL.revokeObjectURL(url);
        }

        sendBtn.addEventListener("click", sendMessage);
        loadBtn.addEventListener("click", loadSession);
        exportBtn.addEventListener("click", exportSession);
        promptEl.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        addBubble("Workspace ready. Send your first query to begin local training capture. Toggle Learn Mode to provide feedback.", "assistant");
    </script>
</body>
</html>
