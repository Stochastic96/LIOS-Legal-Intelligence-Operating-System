    effective_date: "2021-03-10"
    last_updated: "2023-12-01"
    primary_agents:
      - finance
    secondary_agents: []
    enabled: true
    thresholds:
      large_enterprise:
        assets_under_management_min: 100000000
        employees_min: 500

